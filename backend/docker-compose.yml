services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rm
      POSTGRES_PASSWORD: rm
      POSTGRES_DB: rmsolver
    ports:
      - "5433:5432"
    volumes:
      - rm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rm -d rmsolver"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rm_pgdata:
