# Full stack: pgvector DB + FastAPI backend + nginx-served frontend.
#   docker compose up --build
#   frontend -> http://localhost:8080   (proxies /api/ to backend)
#   backend  -> http://localhost:8000   (direct API + /docs)
#
# DB is internal-only (not published) so it won't clash with any host
# Postgres or the standalone backend/docker-compose.yml container.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rm
      POSTGRES_PASSWORD: rm
      POSTGRES_DB: rmsolver
    volumes:
      - rm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rm -d rmsolver"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://rm:rm@db:5432/rmsolver
      LLM_BASE_URL: ${LLM_BASE_URL:-https://some-url}
      LLM_API_TOKEN: ${LLM_API_TOKEN:-test-token}
      LLM_MODEL_CHAT: ${LLM_MODEL_CHAT:-model-name}
      LLM_MODEL_AUDIO: ${LLM_MODEL_AUDIO:-model-name}
      LLM_MODEL_VISION: ${LLM_MODEL_VISION:-model-test}
      LLM_VERIFY_SSL: ${LLM_VERIFY_SSL:-false}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8011:8000"

  frontend:
    build: .
    depends_on:
      - backend
    ports:
      - "8090:80"

volumes:
  rm_pgdata:
