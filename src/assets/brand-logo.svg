<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RM Portal logo">
  <defs>
    <linearGradient id="badge" x1="24" y1="20" x2="136" y2="148" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#3730A3"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.32" cy="0.26" r="0.85">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="56" y1="44" x2="104" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#312E81" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- rounded badge with depth -->
  <rect x="20" y="16" width="120" height="120" rx="34" fill="url(#badge)" filter="url(#soft)"/>
  <rect x="20" y="16" width="120" height="120" rx="34" fill="url(#sheen)"/>
  <rect x="20.75" y="16.75" width="118.5" height="118.5" rx="33.25" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- relationship + growth mark: two figures and an upward arrow -->
  <g fill="url(#mark)">
    <circle cx="66" cy="58" r="11"/>
    <path d="M48 96c0-10.5 8.4-19 18-19s18 8.5 18 19v3H48v-3z"/>
    <circle cx="98" cy="64" r="9" fill-opacity="0.92"/>
    <path d="M83 98c0-9 7.2-16.3 15-16.3S113 89 113 98v2H83v-2z" fill-opacity="0.92"/>
  </g>
  <path d="M92 86l16-16m0 0h-11m11 0v11" stroke="#FFFFFF" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
