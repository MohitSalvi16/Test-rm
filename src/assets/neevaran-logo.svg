<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Neevaran logo">
  <defs>
    <linearGradient id="nv-badge" x1="24" y1="20" x2="136" y2="148" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#3730A3"/>
    </linearGradient>
    <radialGradient id="nv-sheen" cx="0.32" cy="0.26" r="0.85">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nv-plus" x1="64" y1="48" x2="96" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
    <filter id="nv-soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#312E81" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- rounded badge with depth -->
  <rect x="20" y="16" width="120" height="120" rx="34" fill="url(#nv-badge)" filter="url(#nv-soft)"/>
  <rect x="20" y="16" width="120" height="120" rx="34" fill="url(#nv-sheen)"/>
  <rect x="20.75" y="16.75" width="118.5" height="118.5" rx="33.25" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- rounded plus mark -->
  <path d="M80 46c4.4 0 8 3.6 8 8v18h18c4.4 0 8 3.6 8 8s-3.6 8-8 8H88v18c0 4.4-3.6 8-8 8s-8-3.6-8-8V96H54c-4.4 0-8-3.6-8-8s3.6-8 8-8h18V54c0-4.4 3.6-8 8-8z" fill="url(#nv-plus)"/>
